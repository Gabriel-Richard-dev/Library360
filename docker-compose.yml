version: "3.9"

services:
  livro:
    build:
      context: livro-ms/.
    depends_on:
      - livro-db
  autor:
    build:
      context: autor-ms/.
    depends_on:
      - autor-db
  livro-db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: livrodb
      POSTGRES_USER: livro
      POSTGRES_PASSWORD: livro

  autor-db:
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: autordb
      POSTGRES_USER: autor
      POSTGRES_PASSWORD: autor
